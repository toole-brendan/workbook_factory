# DDG-51 workbook data manifest (human-readable governance doc).
#
# The RUNTIME authority is sheets/_data.py (the build resolves logical stems through
# it). This file mirrors that map for review + provenance, and is the place a future
# Virginia/Columbia extraction would fork rather than silently reuse a ddg_* file.
# Every entry below is read by the build: a rendered sheet (make_flat_sheet csv_name=
# with no in-memory table=) or a _sam_integrity guard.

program: DDG-51
workbook: "Distributed Shipbuilding - DDG-51 TAM + SAM"
build_entrypoint: ddg/build_workbook.py
runtime_resolver: ddg/sheets/_data.py   # authoritative logical-stem -> path map

naming_rules:
  ddg_prefix: "row universe filtered to DDG-51 (not merely 'about DDG')"
  ref_prefix: "general reference table, not a DDG row universe"
  audit: "build-stopping guard input, not a visible worksheet tab"
  lineage_folders: "tam_budget / sam_awards is data lineage, not a package split"

# logical stem (as used in sheet code) -> path under data/
tam_budget:
  scn_budget:           workbook_inputs/tam_budget/ddg_scn_budget.csv
  ap_lltm:              workbook_inputs/tam_budget/ddg_ap_lltm.csv
  place_of_performance: workbook_inputs/tam_budget/ddg_place_of_performance.csv
  obbba:                workbook_inputs/tam_budget/ddg_obbba.csv
  fydp_outyears:        workbook_inputs/tam_budget/ddg_fydp_outyears.csv
  deflators:            workbook_inputs/tam_budget/ref_tam_procurement_deflators_fy2026.csv

sam_awards:
  prime_awards:                workbook_inputs/sam_awards/scope/ddg_prime_awards.csv
  prime_contract_scope:        workbook_inputs/sam_awards/scope/ddg_prime_contract_scope.csv
  ddg_subaward_transactions:   workbook_inputs/sam_awards/transactions/ddg_subaward_transactions.csv
  supplier_master:             workbook_inputs/sam_awards/supplier/ddg_supplier_master.csv
  supplier_year_activity:      workbook_inputs/sam_awards/supplier/ddg_supplier_year_activity.csv
  naics6_archetype_map:        workbook_inputs/sam_awards/classification/ddg_naics6_archetype_map.csv
  vendor_archetype_overrides:  workbook_inputs/sam_awards/classification/ddg_vendor_archetype_overrides.csv
  hii_swbs_crosswalk:          workbook_inputs/sam_awards/swbs/ddg_hii_swbs_crosswalk.csv
  ddg_swbs_by_subsystem:       workbook_inputs/sam_awards/swbs/ddg_swbs_by_subsystem.csv
  ddg_piid_hull_map:           workbook_inputs/sam_awards/hull/ddg_piid_hull_map.csv
  ddg_hull_master:             workbook_inputs/sam_awards/hull/ddg_hull_master.csv
  ddg_hull_exceptions:         workbook_inputs/sam_awards/hull/ddg_hull_exceptions.csv
  ddg_vendor_hull_exposure:    workbook_inputs/sam_awards/hull/ddg_vendor_hull_exposure.csv
  ddg_vendor_hull_swbs:        workbook_inputs/sam_awards/hull/ddg_vendor_hull_swbs.csv
  ddg_cd_lifecycle_rollup:     workbook_inputs/sam_awards/lifecycle/ddg_cd_lifecycle_rollup.csv
  ddg_cd_lifecycle_candidates: workbook_inputs/sam_awards/lifecycle/ddg_cd_lifecycle_candidates.csv
  deflators:                   workbook_inputs/sam_awards/reference/ref_sam_procurement_deflators_fy2026.csv

audit:                         # _sam_integrity guard inputs only
  duplicate_audit:      audit/duplicate_audit.csv
  duplicate_candidates: audit/duplicate_candidates.csv

# Intentionally NOT build inputs:
#   ddg_program_vendors  - the program-vendor roll-up is an in-memory cut of Supplier
#                          Master; the universe guard was refactored to compare the two
#                          real runtime sources (ddg_subaward_transactions <-> supplier_master),
#                          so this file is dropped entirely.
#   taxonomy             - D/P vocabulary is hardcoded in sheets/_sam_taxonomy.py.
#   research artifacts   - classifications, vendor_context, *_archetype_results, *.pre_mece,
#                          ddg_top_vendors, ddg_subaward_research_results, parent_concentration,
#                          swbs_curated_c (not read by the build).
